name: Validate

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install validation dependencies
        run: python -m pip install pyyaml

      - name: Validate YAML
        run: |
          python - <<'PY'
          import yaml
          for path in ["repository.yaml", "addon/config.yaml"]:
              with open(path) as f:
                  yaml.safe_load(f)
              print(f"OK {path}")
          PY

      - name: Compile Python
        run: |
          python -m py_compile \
            proxy_server.py \
            gemini_session.py \
            ha_client.py \
            addon/proxy_server.py \
            addon/gemini_session.py \
            addon/ha_client.py

      - name: Check publishable files for obvious local secrets
        run: |
          python - <<'PY'
          import re
          import subprocess
          import sys
          from pathlib import Path

          pattern = re.compile(r'AIza|Bearer [A-Za-z0-9_.-]+|password: "[^"]+"|192\.168\.8\.|/Users/')
          excluded = {
              ".github/workflows/validate.yml",
              "RELEASE.md",
          }
          hits = []
          files = subprocess.check_output(["git", "ls-files"], text=True).splitlines()
          for file_name in files:
              if file_name in excluded:
                  continue
              path = Path(file_name)
              try:
                  text = path.read_text(errors="ignore")
              except UnicodeDecodeError:
                  continue
              for line_no, line in enumerate(text.splitlines(), 1):
                  if pattern.search(line):
                      hits.append(f"{file_name}:{line_no}: {line}")

          if hits:
              print("Potential local secrets found:")
              print("\n".join(hits))
              sys.exit(1)
          print("No obvious local secrets found.")
          PY
